name: Build Kyria firmware

on:
  push:
    paths:
      - 'keyboards/splitkb/kyria/keymaps/axeltlarsson/**'
      - '.github/workflows/build_kyria.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: ghcr.io/qmk/qmk_cli

    steps:
      - name: Disable git safe directory checks
        run: git config --global --add safe.directory '*'

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build firmware
        run: qmk compile -kb splitkb/kyria/rev1 -km axeltlarsson

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: kyria_rev1_axeltlarsson
          path: |
            *.hex
            *.bin
            *.uf2
